name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: |
          $repo = 'AutoHotkey/AutoHotkey'
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -like 'AutoHotkey_2*.zip' } | Select-Object -First 1
          $zip = "$env:RUNNER_TEMP\ahk.zip"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\ahk"
          $ahkDir = Get-ChildItem -Recurse -Path "$env:RUNNER_TEMP\ahk" -Filter "AutoHotkey64.exe" | Select-Object -First 1 | Split-Path -Parent
          echo "AHK_DIR=$ahkDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Compile
        run: |
          & "$env:AHK_DIR\Compiler\Ahk2Exe.exe" /in CapsLockCtrl.ahk /out CapsLockCtrl.exe /base "$env:AHK_DIR\AutoHotkey64.exe"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: CapsLockCtrl.exe
          generate_release_notes: true
