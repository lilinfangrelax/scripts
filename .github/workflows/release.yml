name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: choco install autohotkey.portable --no-progress -y

      - name: Compile
        run: |
          $ahk = (Get-ChildItem -Path "C:\Program Files\AutoHotkey" -Filter "AutoHotkey64.exe" -Recurse | Select-Object -First 1).FullName
          $ahk2exe = (Get-ChildItem -Path "C:\Program Files\AutoHotkey" -Filter "Ahk2Exe.exe" -Recurse | Select-Object -First 1).FullName
          & $ahk2exe /in CapsLockCtrl.ahk /out CapsLockCtrl.exe /base $ahk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: CapsLockCtrl.exe
          generate_release_notes: true
