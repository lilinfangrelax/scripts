name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2 via Scoop
        shell: pwsh
        run: |
          scoop bucket add extras
          scoop install autohotkey

      - name: Compile
        shell: pwsh
        run: |
          $ahkDir = "$env:USERPROFILE\scoop\apps\autohotkey\current"
          Write-Host "AHK directory: $ahkDir"
          Get-ChildItem -Path $ahkDir -Recurse -Filter "*.exe" | ForEach-Object { Write-Host "  $($_.FullName)" }

          $ahk2exe = Get-ChildItem -Path $ahkDir -Filter "Ahk2Exe.exe" -Recurse | Select-Object -First 1
          $ahkExe = Get-ChildItem -Path $ahkDir -Filter "AutoHotkey64.exe" -Recurse | Select-Object -First 1
          if (-not $ahkExe) { $ahkExe = Get-ChildItem -Path $ahkDir -Filter "AutoHotkey.exe" -Recurse | Select-Object -First 1 }

          & "$($ahk2exe.FullName)" /in "$env:GITHUB_WORKSPACE\CapsLockCtrl.ahk" /out "$env:GITHUB_WORKSPACE\CapsLockCtrl.exe" /bin "$($ahkExe.DirectoryName)"

      - name: Verify
        shell: pwsh
        run: |
          Get-ChildItem -Path "$env:GITHUB_WORKSPACE" -Filter "*.exe" | ForEach-Object {
            Write-Host "$($_.Name): $($_.Length) bytes"
          }
          if (-not (Test-Path "$env:GITHUB_WORKSPACE\CapsLockCtrl.exe")) {
            Write-Host "ERROR: CapsLockCtrl.exe was not created!"
            exit 1
          }

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: CapsLockCtrl.exe
          generate_release_notes: true
