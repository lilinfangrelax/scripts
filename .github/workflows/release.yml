name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install AutoHotkey v2
        run: choco install autohotkey.portable --no-progress -y

      - name: Download Ahk2Exe
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/AutoHotkey/Ahk2Exe/releases/latest" -Headers @{ Authorization = "Bearer $env:GH_TOKEN" }
          $asset = $release.assets | Where-Object { $_.name -like 'Ahk2Exe*.zip' } | Select-Object -First 1
          $zip = "$env:RUNNER_TEMP\ahk2exe.zip"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\ahk2exe"
          $ahk2exePath = (Get-ChildItem -Path "$env:RUNNER_TEMP\ahk2exe" -Filter "Ahk2Exe.exe" -Recurse | Select-Object -First 1).FullName
          "AHK2EXE=$ahk2exePath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Find AHK runtime
        shell: pwsh
        run: |
          $ahkExe = Get-ChildItem -Path "C:\ProgramData\chocolatey\lib\autohotkey.portable" -Filter "AutoHotkey64.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $ahkExe) { $ahkExe = Get-ChildItem -Path "C:\ProgramData\chocolatey\lib\autohotkey.portable" -Filter "AutoHotkey*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1 }
          "AHK_DIR=$($ahkExe.DirectoryName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "AHK_EXE=$($ahkExe.Name)" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Compile
        shell: pwsh
        run: |
          $ahk2exe = "$env:AHK2EXE"
          $ahk = "$env:AHK_DIR\$env:AHK_EXE"
          $ws = "$env:GITHUB_WORKSPACE"
          Write-Host "Ahk2Exe: $ahk2exe"
          Write-Host "AHK base: $ahk"
          Write-Host "Workspace: $ws"

          # Try running Ahk2Exe and capturing output
          $p = Start-Process -FilePath $ahk2exe -ArgumentList "/in `"$ws\CapsLockCtrl.ahk`" /out `"$ws\CapsLockCtrl.exe`" /bin `"$ahk`"" -Wait -NoNewWindow -PassThru -RedirectStandardOutput "$env:RUNNER_TEMP\ahk2exe_out.txt" -RedirectStandardError "$env:RUNNER_TEMP\ahk2exe_err.txt"
          Write-Host "ExitCode: $($p.ExitCode)"

          if (Test-Path "$env:RUNNER_TEMP\ahk2exe_out.txt") {
            Write-Host "--- stdout ---"
            Get-Content "$env:RUNNER_TEMP\ahk2exe_out.txt" | ForEach-Object { Write-Host $_ }
          }
          if (Test-Path "$env:RUNNER_TEMP\ahk2exe_err.txt") {
            Write-Host "--- stderr ---"
            Get-Content "$env:RUNNER_TEMP\ahk2exe_err.txt" | ForEach-Object { Write-Host $_ }
          }

          Write-Host "Files in workspace:"
          Get-ChildItem -Path $ws -Filter "*.exe" | ForEach-Object { Write-Host "  $($_.Name) - $($_.Length) bytes" }

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: CapsLockCtrl.exe
          generate_release_notes: true
