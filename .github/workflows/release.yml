name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download AutoHotkey v2
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/AutoHotkey/AutoHotkey/releases/latest" -Headers @{ Authorization = "Bearer $env:GH_TOKEN" }
          $asset = $release.assets | Where-Object { $_.name -like '*_setup.exe' } | Select-Object -First 1
          $installer = "$env:RUNNER_TEMP\ahk-setup.exe"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $installer
          "AHK_INSTALLER=$installer" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Extract AHK
        shell: pwsh
        run: |
          $ahkDir = "$env:RUNNER_TEMP\ahk"
          New-Item -ItemType Directory -Path $ahkDir -Force | Out-Null
          & "$env:AHK_INSTALLER" /extract $ahkDir
          Write-Host "Extracted files:"
          Get-ChildItem -Path $ahkDir -Recurse -Filter "*.exe" | ForEach-Object { Write-Host "  $($_.FullName)" }
          "AHK_DIR=$ahkDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Compile
        shell: pwsh
        run: |
          $ahkDir = "$env:AHK_DIR"
          $ahk2exe = Get-ChildItem -Path $ahkDir -Filter "Ahk2Exe.exe" -Recurse | Select-Object -First 1
          $ahkExe = Get-ChildItem -Path $ahkDir -Filter "AutoHotkey64.exe" -Recurse | Select-Object -First 1
          if (-not $ahkExe) { $ahkExe = Get-ChildItem -Path $ahkDir -Filter "AutoHotkey*.exe" -Recurse | Select-Object -First 1 }

          $script = "$env:GITHUB_WORKSPACE\CapsLockCtrl.ahk"
          $output = "$env:GITHUB_WORKSPACE\CapsLockCtrl.exe"
          $binDir = $ahkExe.DirectoryName

          Write-Host "Compiler: $($ahk2exe.FullName)"
          Write-Host "AHK: $($ahkExe.FullName)"
          Write-Host "Bin dir: $binDir"

          # Ahk2Exe from the full distribution uses /base for the .exe path
          & "$($ahk2exe.FullName)" /in "$script" /out "$output" /base "$($ahkExe.FullName)"

          if (Test-Path $output) {
            Write-Host "SUCCESS: $output ($((Get-Item $output).Length) bytes)"
          } else {
            Write-Host "FAILED: CapsLockCtrl.exe not found"
            Get-ChildItem -Path "$env:GITHUB_WORKSPACE" | ForEach-Object { Write-Host "  $($_.Name)" }
            exit 1
          }

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: CapsLockCtrl.exe
          generate_release_notes: true
